<!-- 헤더 생략 -->
<main class="container mx-auto px-6 pt-[120px]">
    <div class="flex border-b border-zinc-700 mb-8" id="item_tabs">
        <!-- 탭 메뉴 (자바스크립트로 생성 또는 직접 작성) -->
        <button onclick="updateItem('fiber')" class="px-6 py-3">파이버레이저</button>
        <button onclick="updateItem('co2')" class="px-6 py-3">CO2 레이저</button>
        <!-- ... 나머지 버튼 ... -->
    </div>
    
    <div id="item_display" class="bg-[#1f1f1f] p-8 rounded-lg">
        <!-- 자바스크립트가 여기에 내용을 채움 -->
    </div>
</main>

<script>
    const itemData = { /* 기존 itemData 객체 복사 */ };
    
    function updateItem(key) {
        const data = itemData[key];
        document.getElementById('item_display').innerHTML = `
            <h4 class="text-2xl font-bold mb-2">${data.title}</h4>
            <p class="text-blue-500 mb-6">${data.desc}</p>
            <div class="text-zinc-300">${data.content}</div>
        `;
    }

    // 페이지 로드 시 URL 파라미터 확인
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type') || 'fiber';
    updateItem(type);
</script>
