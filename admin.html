<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- kookyhon v6 admin no default email -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>문의 관리자 - 쿠키혼레이저</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://kzbchskpscdyzwqqcqhk.supabase.co';
        const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_WBqZIpbSfr1_J1xieoIzzA_R9AWhzJu';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
        function esc(v) {
            return String(v || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");
        }
        function statusText(s) {
            if (s === 'answered') return '답변완료';
            if (s === 'closed') return '종결';
            return '접수';
        }
        function visibilityText(v) {
            return v === 'public' ? '공개' : '비공개';
        }
        function dateText(v) {
            return v ? new Date(v).toLocaleString('ko-KR') : '';
        }
    </script>


    <style>
        :root { --kh-blue:#005bac; --kh-blue-dark:#003f7a; --kh-line:#e5e7eb; --kh-bg:#f5f7fa; }
        body { font-family:'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',Arial,sans-serif; background:var(--kh-bg); color:#111827; word-break: keep-all; }
        .kh-card { background:#fff; border:1px solid var(--kh-line); box-shadow:0 16px 40px rgba(17,24,39,.06); }
        .kh-btn-primary { background:var(--kh-blue); color:white; font-weight:800; }
        .kh-btn-primary:hover { background:var(--kh-blue-dark); }
        .kh-btn-line { border:1px solid #cbd5e1; background:white; font-weight:800; }
        .kh-btn-line:hover { border-color:var(--kh-blue); color:var(--kh-blue); }
        .badge-private { background:#111827; color:#fff; }
        .badge-public { background:#dbeafe; color:var(--kh-blue); }
        .badge-status { background:#f1f5f9; color:#334155; }
        .row-hover:hover { background:#f8fafc; }
        .icon-btn { width:38px; height:38px; display:inline-flex; align-items:center; justify-content:center; border:1px solid #cbd5e1; background:#fff; border-radius:4px; font-weight:900; text-decoration:none; }
        .icon-btn:hover { border-color:var(--kh-blue); color:var(--kh-blue); }
    
        /* kookyhon v60 font system */
        body {
            font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
            word-break: keep-all;
        }
        h1, h2, h3, h4,
        .font-black {
            font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
        }
        .tech-en,
        .section-kicker,
        .nav-link,
        .product-category-btn,
        .model-tab,
        .custom-model-tab {
            font-family: "Montserrat", "Pretendard", sans-serif;
            letter-spacing: .02em;
        }
        .logo-tech,
        .hero-tech-title,
        .product-hero-title,
        .en-product-title {
            font-family: "Exo 2", "Montserrat", "Pretendard", sans-serif;
            letter-spacing: -.02em;
        }
        .section-kicker {
            letter-spacing: .14em;
        }

    </style>


    <!-- kookyhon v60 font style: Pretendard + Montserrat + Exo 2 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700;800;900&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">

</head>
<body>
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="font-black text-xl tracking-[-0.04em]">KOOKYHON LASER</a>
            <nav class="flex gap-3 text-sm font-bold items-center">
                <a href="index.html" class="icon-btn" title="홈페이지로 이동">⌂</a>
                <a href="inquiry-check.html" class="px-4 py-2 kh-btn-line rounded-sm">고객 답변확인</a>
                <a href="public-inquiries.html" class="px-4 py-2 kh-btn-line rounded-sm">공개 문의</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <section id="loginBox" class="kh-card p-8 md:p-10 rounded-sm max-w-xl">
            <h1 class="text-3xl font-black tracking-[-0.04em]">관리자 로그인</h1>
            <p class="mt-3 text-slate-600 leading-7">Supabase Auth 관리자 계정으로 로그인합니다.</p>
            <form onsubmit="login(); return false;" class="mt-8 space-y-4">
                <input id="adminEmail" type="email" placeholder="관리자 이메일" class="w-full p-4 border border-slate-300 rounded-sm">
                <input id="adminPassword" type="password" placeholder="관리자 비밀번호" class="w-full p-4 border border-slate-300 rounded-sm">
                <button type="submit" class="w-full py-4 kh-btn-primary rounded-sm">로그인</button>
            </form>
        </section>

        <section id="panel" class="hidden">
            <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-5 mb-8">
                <div>
                    <h1 class="text-4xl font-black tracking-[-0.05em]">상담문의 목록</h1>
                    <p id="loginInfo" class="mt-3 text-slate-600"></p>
                </div>
                <div class="flex flex-wrap gap-3">
                    <a href="index.html" class="px-5 py-3 kh-btn-primary rounded-sm inline-flex items-center gap-2" title="홈페이지로 이동">⌂ 홈페이지</a>
                    <button onclick="loadInquiries('all')" id="btn-all" class="px-5 py-3 kh-btn-line rounded-sm">전체</button>
                    <button onclick="loadInquiries('private')" id="btn-private" class="px-5 py-3 kh-btn-line rounded-sm">비공개</button>
                    <button onclick="loadInquiries('public')" id="btn-public" class="px-5 py-3 kh-btn-line rounded-sm">공개</button>
                    <button onclick="logout()" class="px-5 py-3 bg-slate-900 text-white font-bold rounded-sm">로그아웃</button>
                </div>
            </div>

            <div class="grid md:grid-cols-4 gap-4 mb-8">
                <div class="kh-card p-5 rounded-sm"><div class="text-sm text-slate-500">전체 문의</div><div id="countAll" class="mt-2 text-3xl font-black">0</div></div>
                <div class="kh-card p-5 rounded-sm"><div class="text-sm text-slate-500">비공개</div><div id="countPrivate" class="mt-2 text-3xl font-black">0</div></div>
                <div class="kh-card p-5 rounded-sm"><div class="text-sm text-slate-500">공개</div><div id="countPublic" class="mt-2 text-3xl font-black">0</div></div>
                <div class="kh-card p-5 rounded-sm"><div class="text-sm text-slate-500">답변완료</div><div id="countAnswered" class="mt-2 text-3xl font-black">0</div></div>
            </div>

            <div class="kh-card rounded-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                    <div class="font-black">문의 리스트</div>
                    <div class="text-sm text-slate-500">상세 상담내용과 답글은 돋보기 아이콘을 눌러 확인합니다.</div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[980px] text-left">
                        <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
                            <tr>
                                <th class="px-5 py-4">순번</th>
                                <th class="px-5 py-4">분류</th>
                                <th class="px-5 py-4">상태</th>
                                <th class="px-5 py-4">접수번호</th>
                                <th class="px-5 py-4">업체/성함</th>
                                <th class="px-5 py-4">연락처</th>
                                <th class="px-5 py-4">접수일</th>
                                <th class="px-5 py-4">상세</th>
                            </tr>
                        </thead>
                        <tbody id="inquiryTable" class="divide-y divide-slate-200"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

<script>
let currentFilter = 'all';
let allItems = [];

async function checkSession() {
    const { data } = await supabaseClient.auth.getSession();
    if (data.session) {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('panel').classList.remove('hidden');
        document.getElementById('loginInfo').innerText = `${data.session.user.email} 계정으로 로그인 중`;
        await loadInquiries('all');
    }
}

async function login() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
        alert(error.message || '로그인에 실패했습니다.');
        return;
    }
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
    document.getElementById('loginInfo').innerText = `${data.user.email} 계정으로 로그인 중`;
    await loadInquiries('all');
}

async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
}

function setActiveButton(filter) {
    ['all', 'private', 'public'].forEach(key => {
        const btn = document.getElementById(`btn-${key}`);
        if (!btn) return;
        btn.classList.toggle('kh-btn-primary', key === filter);
        btn.classList.toggle('kh-btn-line', key !== filter);
    });
}

async function loadInquiries(filter = currentFilter) {
    currentFilter = filter;
    setActiveButton(filter);

    const { data, error } = await supabaseClient
        .from('inquiries')
        .select('id, public_code, company, name, phone, email, visibility, status, is_public_approved, created_at')
        .order('created_at', { ascending: false })
        .limit(500);

    const tbody = document.getElementById('inquiryTable');

    if (error) {
        tbody.innerHTML = `<tr><td colspan="8" class="px-5 py-8 text-red-600">${esc(error.message)}</td></tr>`;
        return;
    }

    allItems = data || [];
    renderCounts();

    const filtered = allItems.filter(item => filter === 'all' || item.visibility === filter);

    if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-5 py-8 text-slate-500">표시할 문의가 없습니다.</td></tr>';
        return;
    }

    tbody.innerHTML = filtered.map((item, index) => `
        <tr class="row-hover">
            <td class="px-5 py-4 font-black">${index + 1}</td>
            <td class="px-5 py-4">
                <span class="px-3 py-1 text-xs font-black rounded-sm ${item.visibility === 'private' ? 'badge-private' : 'badge-public'}">
                    ${visibilityText(item.visibility)}
                </span>
            </td>
            <td class="px-5 py-4">
                <span class="px-3 py-1 text-xs font-black rounded-sm badge-status">${statusText(item.status)}</span>
            </td>
            <td class="px-5 py-4 font-bold whitespace-nowrap">${esc(item.public_code)}</td>
            <td class="px-5 py-4">
                <div class="font-black">${esc(item.company)}</div>
                <div class="text-sm text-slate-500">${esc(item.name)}</div>
            </td>
            <td class="px-5 py-4">
                <div>${esc(item.phone || '')}</div>
                <div class="text-sm text-slate-500">${esc(item.email || '')}</div>
            </td>
            <td class="px-5 py-4 whitespace-nowrap">${dateText(item.created_at)}</td>
            <td class="px-5 py-4">
                <a class="icon-btn" href="inquiry-detail.html?id=${item.id}" title="상세 상담내용 보기">🔍</a>
            </td>
        </tr>
    `).join('');
}

function renderCounts() {
    document.getElementById('countAll').innerText = allItems.length;
    document.getElementById('countPrivate').innerText = allItems.filter(i => i.visibility === 'private').length;
    document.getElementById('countPublic').innerText = allItems.filter(i => i.visibility === 'public').length;
    document.getElementById('countAnswered').innerText = allItems.filter(i => i.status === 'answered').length;
}

checkSession();
</script>
</body>
</html>
